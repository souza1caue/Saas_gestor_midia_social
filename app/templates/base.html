<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Violeiros da Terra" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}?v=brand-logo-1">
</head>
<body class="app-night">
<nav class="navbar navbar-expand-lg app-navbar">
    <div class="container-fluid px-4">
        <a class="navbar-brand app-brand" href="/dashboard">
            <img class="app-brand-mark" src="{{ url_for('static', path='/img/violeiros-marca-redonda.png') }}" alt="Violeiros da Terra">
            <span>Violeiros da Terra</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/content/generate">Gerar</a></li>
                <li class="nav-item"><a class="nav-link" href="/content/future">Próximos posts</a></li>
                <li class="nav-item"><a class="nav-link" href="/content/history">Histórico</a></li>
                <li class="nav-item"><a class="nav-link" href="/calendar">Calendário</a></li>
                <li class="nav-item"><a class="nav-link" href="/briefing">Estrategia</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="app-shell">
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}
    {% if warning %}
    <div class="alert alert-warning">{{ warning }}</div>
    {% endif %}
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', path='/js/main.js') }}?v=brand-logo-1"></script>
</body>
</html>
