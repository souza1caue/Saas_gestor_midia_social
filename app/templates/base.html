<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Social Media SaaS" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/dashboard">Social Media SaaS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                {% if user %}
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/content/generate">Gerar</a></li>
                <li class="nav-item"><a class="nav-link" href="/content/history">Histórico</a></li>
                <li class="nav-item"><a class="nav-link" href="/calendar">Calendário</a></li>
                <li class="nav-item"><a class="nav-link" href="/briefing">Briefing</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout">Sair</a></li>
                {% else %}
                <li class="nav-item"><a class="nav-link" href="/login">Entrar</a></li>
                <li class="nav-item"><a class="nav-link" href="/register">Criar conta</a></li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', path='/js/main.js') }}"></script>
</body>
</html>
